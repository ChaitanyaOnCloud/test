name: CI Pipeline

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  build-backend:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ./backend
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
      - name: Run tests
        run: pytest
      - name: Upload backend test results
        uses: actions/upload-artifact@v4
        with:
          name: backend-test-results
          path: ./backend/test-results/

  build-frontend:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ./frontend
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      - name: Lint HTML/CSS/JS
        run: echo "No linting configured for vanilla frontend."
      - name: Upload frontend
        uses: actions/upload-artifact@v4
        with:
          name: frontend-static-files
          path: ./frontend/

  summary:
    runs-on: ubuntu-latest
    needs: [build-backend, build-frontend]
    steps:
      - name: Download backend test results
        uses: actions/download-artifact@v4
        with:
          name: backend-test-results
          path: ./backend/test-results/
      - name: Download frontend static files
        uses: actions/download-artifact@v4
        with:
          name: frontend-static-files
          path: ./frontend/
      - name: Display summary
        run: |
          echo "Backend and frontend build complete."
