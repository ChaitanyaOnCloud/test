---
name: CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    defaults:
      run:
        shell: bash
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'

      - name: Install backend dependencies
        working-directory: ./backend
        run: |
          if [ -f requirements.txt ]; then
            python -m pip install --upgrade pip
            pip install -r requirements.txt
          else
            echo 'No requirements.txt found in ./backend.'
          fi

      - name: Run backend tests
        working-directory: ./backend
        run: |
          if [ -d tests ]; then
            pytest
          else
            echo 'No tests directory found in ./backend.'
          fi

      - name: Check frontend files
        run: |
          if [ ! -f ./frontend/index.html ]; then
            echo 'Missing ./frontend/index.html'; exit 1;
          fi
          if [ -d ./frontend/css ]; then
            echo './frontend/css exists';
          else
            echo './frontend/css does not exist (skipping)';
          fi
          if [ -d ./frontend/js ]; then
            echo './frontend/js exists';
          else
            echo './frontend/js does not exist (skipping)';
          fi
