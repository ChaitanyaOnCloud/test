name: CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'

      - name: Install backend dependencies
        working-directory: ./backend
        run: |
          if [ -d "./backend" ]; then
            python -m pip install --upgrade pip
            if [ -f requirements.txt ]; then
              pip install -r requirements.txt
            fi
          else
            echo "Backend directory not found!" && exit 1
          fi

      - name: Run backend tests
        working-directory: ./backend
        run: |
          if [ -d "./backend" ]; then
            if [ -f requirements.txt ]; then
              pytest
            else
              echo "No requirements.txt found, skipping tests."
            fi
          else
            echo "Backend directory not found!" && exit 1
          fi

      - name: Lint frontend files
        working-directory: ./frontend
        run: |
          if [ -d "./frontend" ]; then
            echo "Linting frontend files..."
            # Add actual lint commands here if needed
          else
            echo "Frontend directory not found! Skipping lint."
          fi
