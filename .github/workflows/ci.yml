name: CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  backend:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ./backend
    steps:
      - uses: actions/checkout@v4
      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
      - name: Lint
        run: |
          pip install flake8
          flake8 .
      - name: Test
        run: |
          pip install pytest
          pytest

  frontend:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ./frontend
    steps:
      - uses: actions/checkout@v4
      - name: List files
        run: ls -l
      - name: HTML validation
        run: |
          if command -v tidy; then tidy -e *.html || true; else echo 'tidy not installed'; fi
      - name: CSS validation
        run: |
          if command -v stylelint; then stylelint "**/*.css" || true; else echo 'stylelint not installed'; fi
