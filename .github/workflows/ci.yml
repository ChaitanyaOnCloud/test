name: CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v3

      - name: Ensure backend directory exists
        run: |
          if [ ! -d "./backend" ]; then
            echo "Backend directory missing! Failing build.";
            exit 1;
          fi

      - name: Ensure frontend directory exists
        run: |
          if [ ! -d "./frontend" ]; then
            echo "Frontend directory missing! Failing build.";
            exit 1;
          fi

      - name: Set up Python 3.11
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'

      - name: Upgrade pip
        run: python -m pip install --upgrade pip
        working-directory: ./backend

      - name: Install dependencies
        run: |
          if [ -f requirements.txt ]; then
            pip install -r requirements.txt
          else
            echo "requirements.txt not found. Skipping dependency install."
          fi
        working-directory: ./backend

      - name: Run backend tests
        run: |
          if [ -f pytest.ini ] || [ -d tests ]; then
            pytest
          else
            echo "No tests found."
          fi
        working-directory: ./backend

      - name: Lint backend
        run: |
          pip install flake8
          flake8 .
        working-directory: ./backend

      - name: Frontend HTML validation
        run: |
          echo "No build needed for frontend."
        working-directory: ./frontend
