name: CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Ensure backend and frontend directories exist
        run: |
          if [ ! -d './backend' ]; then echo "Missing ./backend directory"; exit 1; fi
          if [ ! -d './frontend' ]; then echo "Missing ./frontend directory"; exit 1; fi

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'

      - name: Upgrade pip
        run: python -m pip install --upgrade pip
        working-directory: ./backend

      - name: Install backend dependencies
        run: |
          if [ -f requirements.txt ]; then pip install -r requirements.txt; fi
        working-directory: ./backend

      - name: Run backend tests
        run: |
          if [ -f tests ]; then pytest tests; else echo "No tests directory found"; fi
        working-directory: ./backend

      - name: Deploy static frontend files (HTML/CSS/JS)
        run: echo 'Deploying static frontend files (HTML/CSS/JS)'
        working-directory: ./frontend
