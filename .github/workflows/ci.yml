# Holistic Workflow Repair for Python/FastAPI backend and Vanilla JS frontend
name: CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  build-backend:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ./backend
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      - name: Ensure backend directory exists
        run: |
          if [ ! -d "./backend" ]; then
            echo "Backend directory missing!"; exit 1;
          fi
      - name: Set up Python 3.11
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'
      - name: Upgrade pip
        run: python -m pip install --upgrade pip
      - name: Install dependencies
        run: |
          if [ -f requirements.txt ]; then
            pip install -r requirements.txt
          fi
      - name: Run backend tests
        run: |
          if [ -d tests ]; then
            pytest tests
          else
            echo "No tests directory found. Skipping tests."
          fi

  lint-backend:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ./backend
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      - name: Ensure backend directory exists
        run: |
          if [ ! -d "./backend" ]; then
            echo "Backend directory missing!"; exit 1;
          fi
      - name: Set up Python 3.11
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'
      - name: Install flake8
        run: pip install flake8
      - name: Run flake8
        run: flake8 .

  build-frontend:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ./frontend
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      - name: Ensure frontend directory exists
        run: |
          if [ ! -d "./frontend" ]; then
            echo "Frontend directory missing!"; exit 1;
          fi
      - name: List frontend files
        run: ls -l
      - name: Check for index.html
        run: |
          if [ ! -f index.html ]; then
            echo "index.html not found!"; exit 1;
          fi

  # No deploy step included; add as needed.
