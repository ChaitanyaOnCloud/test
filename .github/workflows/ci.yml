---
name: CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  build-backend:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ./backend
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      - name: Set up Python 3.10
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          if [ -f requirements.txt ]; then pip install -r requirements.txt; fi
      - name: Run backend tests
        run: |
          if [ -d tests ]; then pytest tests; else echo 'No tests directory found.'; fi

  check-frontend:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      - name: Check frontend directory exists
        run: |
          if [ ! -d "./frontend" ]; then echo "ERROR: ./frontend directory does not exist!" >&2; exit 1; fi
      - name: Lint HTML/CSS/JS (optional)
        run: |
          echo "No build step required for vanilla frontend."
