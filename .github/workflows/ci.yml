name: CI Pipeline

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  build-backend:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ./backend
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          if [ -f requirements.txt ]; then pip install -r requirements.txt; fi
        working-directory: ./backend

      - name: Run backend tests
        run: |
          if [ -f test_main.py ]; then pytest test_main.py; else echo 'No backend tests found.'; fi
        working-directory: ./backend

  check-frontend:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Check frontend files
        run: |
          test -f ./frontend/index.html
          test -d ./frontend/css
          test -d ./frontend/js

      - name: Lint HTML (optional)
        run: |
          echo 'No frontend build required.'

  summary:
    runs-on: ubuntu-latest
    needs: [build-backend, check-frontend]
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      - name: Pipeline Success
        run: echo "All jobs completed successfully."
