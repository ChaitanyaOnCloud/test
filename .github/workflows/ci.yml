name: CI Pipeline

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python 3.10
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'

      - name: Install backend dependencies
        working-directory: ./backend
        run: |
          if [ -f requirements.txt ]; then pip install -r requirements.txt; else echo 'No requirements.txt found'; fi

      - name: Run backend tests
        working-directory: ./backend
        run: |
          if [ -d tests ]; then pytest tests; else echo 'No tests directory found'; fi

      - name: Check frontend static files
        working-directory: ./frontend
        run: |
          if [ -f index.html ]; then echo "Frontend is static HTML/CSS/JS. No build required."; else echo 'No index.html found in frontend'; fi
