name: CI Pipeline

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  build:
    runs-on: ubuntu-latest
    defaults:
      run:
        shell: bash
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'

      - name: Install backend dependencies
        working-directory: ./backend
        run: |
          python -m pip install --upgrade pip
          if [ -f requirements.txt ]; then pip install -r requirements.txt; fi

      - name: Run backend tests
        working-directory: ./backend
        run: |
          if [ -f pytest.ini ] || [ -d tests ]; then pytest; else echo 'No tests found.'; fi

      - name: Lint backend
        working-directory: ./backend
        run: |
          if command -v flake8 >/dev/null 2>&1; then flake8 .; else pip install flake8 && flake8 .; fi

      - name: Check frontend files
        working-directory: ./frontend
        run: |
          ls -l
          if [ -f index.html ]; then echo 'Frontend present.'; else echo 'Frontend missing!'; exit 1; fi
