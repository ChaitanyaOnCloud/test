name: CI Pipeline

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  build-backend:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ./backend
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Ensure backend directory exists
        run: |
          if [ ! -d "./backend" ]; then
            echo "ERROR: ./backend directory does not exist!" >&2
            exit 1
          fi

      - name: Set up Python 3.10
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'

      - name: Upgrade pip
        run: python -m pip install --upgrade pip

      - name: Install dependencies
        run: |
          if [ -f requirements.txt ]; then
            pip install -r requirements.txt
          fi

      - name: Run backend tests
        run: |
          if [ -d tests ]; then
            pytest tests
          else
            echo "No tests directory found. Skipping tests."
          fi

  lint-frontend:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ./frontend
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Ensure frontend directory exists
        run: |
          if [ ! -d "./frontend" ]; then
            echo "ERROR: ./frontend directory does not exist!" >&2
            exit 1
          fi

      - name: Lint HTML files
        run: |
          if command -v tidy >/dev/null 2>&1; then
            find . -name '*.html' -exec tidy -qe {} \;
          else
            echo "tidy not installed, skipping HTML lint."
          fi

      - name: Lint CSS files
        run: |
          if command -v stylelint >/dev/null 2>&1; then
            find . -name '*.css' -exec stylelint {} \;
          else
            echo "stylelint not installed, skipping CSS lint."
          fi
