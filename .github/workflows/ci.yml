on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python 3.10
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'

      - name: Install backend dependencies
        working-directory: ./backend
        run: |
          python -m pip install --upgrade pip
          if [ -f requirements.txt ]; then pip install -r requirements.txt; fi

      - name: Lint backend
        working-directory: ./backend
        run: |
          if [ -f requirements.txt ]; then pip install flake8; fi
          flake8 . || true

      - name: Test backend
        working-directory: ./backend
        run: |
          if [ -f requirements.txt ]; then pip install pytest; fi
          pytest || true

      - name: Check frontend index.html exists
        working-directory: ./frontend
        run: |
          if [ ! -f index.html ]; then echo 'index.html missing' && exit 1; fi

      - name: Lint frontend HTML
        working-directory: ./frontend
        run: |
          if command -v tidy >/dev/null 2>&1; then tidy -e index.html || true; else echo 'tidy not installed, skipping HTML lint'; fi
