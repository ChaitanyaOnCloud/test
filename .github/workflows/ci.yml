name: CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  build-backend:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ./backend
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          if [ -f requirements.txt ]; then pip install -r requirements.txt; fi
      - name: Run backend tests
        run: |
          if [ -f pytest.ini ] || [ -d tests ]; then pytest; else echo 'No tests found.'; fi

  lint-backend:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ./backend
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'
      - name: Install flake8
        run: pip install flake8
      - name: Lint with flake8
        run: |
          if [ -f requirements.txt ]; then pip install -r requirements.txt; fi
          flake8 .

  build-frontend:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ./frontend
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
      - name: Validate HTML
        run: |
          if ls *.html 1> /dev/null 2>&1; then echo 'HTML files found.'; else echo 'No HTML files found.'; fi
      - name: Validate CSS
        run: |
          if ls *.css 1> /dev/null 2>&1; then echo 'CSS files found.'; else echo 'No CSS files found.'; fi
      - name: Validate JS
        run: |
          if ls *.js 1> /dev/null 2>&1; then echo 'JS files found.'; else echo 'No JS files found.'; fi
