---
name: CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  backend:
    name: Backend CI
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ./backend
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      - name: Ensure backend directory exists
        run: |
          if [ ! -d "./backend" ]; then echo "Backend directory missing"; exit 1; fi
      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'
      - name: Upgrade pip
        run: python -m pip install --upgrade pip
      - name: Install dependencies
        run: |
          if [ -f requirements.txt ]; then pip install -r requirements.txt; fi
      - name: Run tests
        run: |
          if [ -f pytest.ini ] || [ -d tests ]; then pytest; else echo 'No tests found.'; fi

  frontend:
    name: Frontend CI
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ./frontend
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      - name: Ensure frontend directory exists
        run: |
          if [ ! -d "./frontend" ]; then echo "Frontend directory missing"; exit 1; fi
      - name: Validate HTML files
        run: |
          if ls *.html 1> /dev/null 2>&1; then echo 'HTML files found.'; else echo 'No HTML files to validate.'; fi
