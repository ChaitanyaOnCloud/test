---
name: CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  backend:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
      - name: Ensure backend directory exists
        run: |
          if [ ! -d "backend" ]; then echo 'backend directory missing' && exit 1; fi
      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'
      - name: Upgrade pip
        run: python -m pip install --upgrade pip
      - name: Install dependencies
        run: |
          if [ -f requirements.txt ]; then pip install -r requirements.txt; fi
      - name: Run backend tests
        run: |
          if [ -d tests ]; then pytest tests; else echo 'No tests directory'; fi

  frontend:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
      - name: Ensure frontend directory exists
        run: |
          if [ ! -d "frontend" ]; then echo 'frontend directory missing' && exit 1; fi
      - name: Check for index.html
        run: |
          if [ ! -f index.html ]; then echo 'index.html missing' && exit 1; fi
      - name: Lint HTML
        run: |
          if command -v tidy >/dev/null 2>&1; then tidy -e index.html || true; else echo 'tidy not installed, skipping lint'; fi
