name: CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Set up Python 3.10
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'

      - name: Ensure backend directory exists
        run: |
          if [ ! -d ./backend ]; then
            echo "Missing ./backend directory. Failing build." && exit 1
          fi

      - name: Install backend dependencies
        working-directory: ./backend
        run: |
          python -m pip install --upgrade pip
          if [ -f requirements.txt ]; then pip install -r requirements.txt; fi

      - name: Run backend tests
        working-directory: ./backend
        run: |
          if [ -f tests/test_main.py ]; then pytest; else echo "No tests found, skipping."; fi

      - name: Check frontend files
        run: |
          test -f ./frontend/index.html
          test -d ./frontend/css
          test -d ./frontend/js

      - name: Lint frontend HTML
        run: |
          if [ -f ./frontend/index.html ]; then echo "Linting index.html"; else echo "No index.html to lint"; fi
