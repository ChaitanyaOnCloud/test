# Holistic rewrite for robust Python/FastAPI backend and static frontend
name: CI Pipeline

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  backend:
    name: Backend CI
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ./backend
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
        retry: 3
      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
      - name: Lint
        run: |
          pip install flake8
          flake8 .
      - name: Run tests
        run: |
          pip install pytest
          pytest

  frontend:
    name: Frontend CI
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ./frontend
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
        retry: 3
      - name: Validate HTML
        run: |
          if ! command -v tidy &> /dev/null; then sudo apt-get update && sudo apt-get install -y tidy; fi
          tidy -e *.html || true
      - name: Validate CSS
        run: |
          if ! command -v csslint &> /dev/null; then npm install -g csslint; fi
          csslint *.css || true
      - name: Validate JS
        run: |
          if ! command -v eslint &> /dev/null; then npm install -g eslint; fi
          eslint *.js || true
