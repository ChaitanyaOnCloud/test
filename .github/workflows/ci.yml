name: CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Ensure backend directory exists
        run: |
          if [ ! -d "./backend" ]; then
            echo "ERROR: ./backend directory missing after checkout."
            exit 1
          fi

      - name: Set up Python 3.10
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'

      - name: Upgrade pip
        run: python -m pip install --upgrade pip
        working-directory: ./backend

      - name: Install dependencies
        run: |
          if [ -f requirements.txt ]; then
            pip install -r requirements.txt
          fi
        working-directory: ./backend

      - name: Run backend tests
        run: |
          if [ -f requirements.txt ]; then
            pip install -r requirements.txt
          fi
          pytest
        working-directory: ./backend

      - name: Lint backend
        run: |
          pip install flake8
          flake8 .
        working-directory: ./backend

      - name: Frontend HTML validation
        run: |
          echo "No build needed for frontend."
        working-directory: ./frontend
