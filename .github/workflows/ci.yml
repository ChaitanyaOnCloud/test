on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'

      - name: Install backend dependencies
        working-directory: ./backend
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Lint backend
        working-directory: ./backend
        run: |
          pip install flake8
          flake8 .

      - name: Test backend
        working-directory: ./backend
        run: |
          pip install pytest
          pytest

      - name: Check frontend index.html
        working-directory: ./frontend
        run: |
          if [ ! -f "index.html" ]; then
            echo "index.html not found in ./frontend" && exit 1
          fi
