name: CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Validate backend directory exists
        run: |
          if [ ! -d "./backend" ]; then
            echo "ERROR: ./backend directory does not exist. Please check your repository structure.";
            exit 1;
          fi

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'

      - name: Install dependencies
        run: |
          cd ./backend
          python -m pip install --upgrade pip
          if [ -f requirements.txt ]; then
            pip install -r requirements.txt
          else
            echo "WARNING: requirements.txt not found. Skipping dependency installation."
          fi

      - name: Run backend tests
        run: |
          cd ./backend
          pytest

      - name: Lint backend
        run: |
          cd ./backend
          pip install flake8
          flake8 .

      - name: Validate frontend directory exists
        run: |
          if [ ! -d "./frontend" ]; then
            echo "ERROR: ./frontend directory does not exist. Please check your repository structure.";
            exit 1;
          fi

      - name: Lint frontend
        run: |
          cd ./frontend
          echo "Linting frontend (HTML/CSS/JS)"
          # Add your linter commands here if needed
