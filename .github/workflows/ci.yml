name: CI Pipeline

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Verify backend directory exists
        run: |
          if [ ! -d "./backend" ]; then
            echo "ERROR: ./backend directory does not exist. Check your repository structure."
            exit 1
          fi

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'
        working-directory: ./backend

      - name: Install backend dependencies
        run: |
          python -m pip install --upgrade pip
          if [ -f requirements.txt ]; then pip install -r requirements.txt; fi
        working-directory: ./backend

      - name: Run backend tests
        run: |
          if [ -f pytest.ini ] || [ -d tests ]; then pytest; else echo "No tests found."; fi
        working-directory: ./backend

      - name: Lint backend
        run: |
          if [ -f requirements.txt ]; then pip install flake8; fi
          flake8 .
        working-directory: ./backend

      - name: Check frontend directory exists
        run: |
          if [ ! -d "./frontend" ]; then
            echo "ERROR: ./frontend directory does not exist. Check your repository structure."
            exit 1
          fi

      - name: Lint frontend (HTML/CSS/JS)
        run: |
          echo "Linting frontend files (HTML/CSS/JS)"
          # Add any frontend linting commands here if needed
        working-directory: ./frontend
