name: CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Ensure backend directory exists
        run: |
          if [ ! -d './backend' ]; then
            echo 'ERROR: ./backend directory missing. Please ensure the backend directory exists and is checked in.'
            exit 1
          fi

      - name: Set up Python 3.11
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'

      - name: Upgrade pip
        run: python -m pip install --upgrade pip
        working-directory: ./backend

      - name: Install dependencies
        run: |
          if [ -f requirements.txt ]; then
            pip install -r requirements.txt
          fi
        working-directory: ./backend

      - name: Run backend tests
        run: |
          if [ -d tests ]; then
            pytest tests
          else
            echo 'No tests directory found.'
          fi
        working-directory: ./backend

      - name: Lint backend
        run: |
          pip install flake8
          flake8 .
        working-directory: ./backend

      - name: Check frontend files
        run: |
          if [ ! -d './frontend' ]; then
            echo 'ERROR: ./frontend directory missing. Please ensure the frontend directory exists and is checked in.'
            exit 1
          fi
          ls -l ./frontend
