---
name: CI Pipeline

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  backend:
    name: Backend CI
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ./backend
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          if [ -f requirements.txt ]; then pip install -r requirements.txt; fi
      - name: Run backend tests
        run: |
          if [ -f pytest.ini ] || [ -d tests ]; then pytest; else echo 'No tests found, skipping.'; fi

  frontend:
    name: Frontend Validation
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      - name: Validate frontend files
        run: |
          if [ ! -f ./frontend/index.html ]; then echo 'Missing index.html' && exit 1; fi
          mkdir -p ./frontend/css
          mkdir -p ./frontend/js
          echo 'Frontend files validated.'

  all-success:
    name: All Jobs Succeeded
    runs-on: ubuntu-latest
    needs: [backend, frontend]
    steps:
      - run: echo 'All jobs completed successfully.'
