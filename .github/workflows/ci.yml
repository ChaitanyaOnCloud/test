name: CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'

      - name: Install backend dependencies
        working-directory: ./backend
        run: |
          python -m pip install --upgrade pip
          if [ -f requirements.txt ]; then pip install -r requirements.txt; fi

      - name: Run backend tests
        working-directory: ./backend
        run: |
          if [ -f tests ]; then pytest; else echo 'No tests directory found, skipping tests.'; fi

      - name: Check frontend index.html exists
        working-directory: ./frontend
        run: |
          if [ ! -f "index.html" ]; then echo "index.html not found in ./frontend" && exit 1; fi

      - name: Lint backend (optional)
        working-directory: ./backend
        run: |
          if [ -f requirements.txt ]; then pip install flake8; fi
          if [ -d . ]; then flake8 . || true; fi
