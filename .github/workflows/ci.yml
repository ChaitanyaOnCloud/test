name: CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'

      - name: Install dependencies
        working-directory: ./backend
        run: |
          if [ -f requirements.txt ]; then
            pip install -r requirements.txt
          else
            echo 'requirements.txt not found in ./backend'; exit 1
          fi

      - name: Run backend tests
        working-directory: ./backend
        run: |
          if [ -f requirements.txt ]; then
            pytest
          else
            echo 'No tests to run: requirements.txt not found.'
          fi

      - name: Lint backend
        working-directory: ./backend
        run: |
          if [ -f requirements.txt ]; then
            pip install flake8
            flake8 .
          else
            echo 'No linting: requirements.txt not found.'
          fi

      - name: Check frontend files
        working-directory: ./frontend
        run: |
          ls -l
