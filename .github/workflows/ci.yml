name: CI Pipeline

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v3

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'

      - name: Install backend dependencies
        working-directory: ./backend
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Lint backend
        working-directory: ./backend
        run: |
          pip install flake8
          flake8 .

      - name: Run backend tests
        working-directory: ./backend
        run: |
          pip install pytest
          pytest

      - name: Lint frontend
        run: |
          npx prettier --check ./frontend/**/*.js || true

      - name: Check frontend HTML/CSS
        run: |
          echo 'No build step required for vanilla HTML/CSS/JS.'
