name: CI Pipeline

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  backend:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ./backend
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Ensure backend directory exists
        run: |
          if [ ! -d ./backend ]; then echo "./backend directory missing"; exit 1; fi

      - name: Set up Python 3.10
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'

      - name: Upgrade pip
        run: python -m pip install --upgrade pip

      - name: Install dependencies
        run: |
          if [ -f requirements.txt ]; then pip install -r requirements.txt; fi

      - name: Run backend tests
        run: |
          if [ -d tests ]; then pytest tests; else echo "No tests directory"; fi

  frontend:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ./frontend
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Ensure frontend directory exists
        run: |
          if [ ! -d ./frontend ]; then echo "./frontend directory missing"; exit 1; fi

      - name: Check for index.html
        run: |
          if [ ! -f index.html ]; then echo 'index.html missing' && exit 1; fi

      - name: Lint HTML/CSS/JS (optional)
        run: echo 'No build step required for vanilla frontend.'
