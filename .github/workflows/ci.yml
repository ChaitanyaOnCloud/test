name: CI Pipeline

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  build-backend:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ./backend
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          if [ -f requirements.txt ]; then pip install -r requirements.txt; fi

      - name: Run backend tests
        run: |
          if [ -d tests ]; then pytest tests; else echo 'No tests directory'; fi

  check-frontend:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ./frontend
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Check for index.html
        run: |
          if [ ! -f index.html ]; then echo 'Missing index.html in frontend'; exit 1; fi

      - name: Lint HTML (optional)
        run: |
          echo 'Linting HTML (implement as needed)'

  summary:
    runs-on: ubuntu-latest
    needs: [build-backend, check-frontend]
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
      - name: Pipeline completed
        run: echo 'CI pipeline completed successfully.'
