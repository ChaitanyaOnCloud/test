---
name: CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  build:
    runs-on: ubuntu-latest
    defaults:
      run:
        shell: bash
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Validate backend directory
        run: |
          if [ ! -d ./backend ]; then
            echo "Missing ./backend directory. Please ensure it exists." && exit 1
          fi

      - name: Validate frontend structure
        run: |
          if [ ! -f ./frontend/index.html ]; then
            echo "Missing index.html in frontend directory" && exit 1
          fi
          if [ ! -d ./frontend/css ]; then
            echo "Missing css directory in frontend" && exit 1
          fi
          if [ ! -d ./frontend/js ]; then
            echo "Missing js directory in frontend" && exit 1
          fi

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'

      - name: Install dependencies
        working-directory: ./backend
        run: |
          if [ -f requirements.txt ]; then
            pip install -r requirements.txt
          else
            echo "requirements.txt not found in ./backend" && exit 1
          fi

      - name: Run backend tests
        working-directory: ./backend
        run: |
          if [ -d tests ]; then
            pytest
          else
            echo "No tests directory found in ./backend, skipping tests."
          fi
