---
name: CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  backend:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ./backend
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          if [ -f requirements.txt ]; then pip install -r requirements.txt; fi

      - name: Run backend tests
        run: |
          if [ -d tests ]; then pytest tests; else echo 'No tests directory'; fi

  frontend:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Check frontend files
        run: |
          test -f ./frontend/index.html
          test -d ./frontend/css
          test -d ./frontend/js

      - name: Lint HTML
        run: |
          sudo apt-get update && sudo apt-get install -y tidy
          tidy -e ./frontend/index.html || true
