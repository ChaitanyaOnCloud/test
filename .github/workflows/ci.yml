name: CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'

      - name: Ensure backend directory exists
        run: |
          if [ ! -d './backend' ]; then echo "./backend directory missing" && exit 1; fi

      - name: Install backend dependencies
        working-directory: ./backend
        run: |
          python -m pip install --upgrade pip
          if [ -f requirements.txt ]; then pip install -r requirements.txt; fi

      - name: Run backend tests
        working-directory: ./backend
        run: |
          if [ -f 'pytest.ini' ] || [ -d 'tests' ]; then pytest; else echo 'No tests found, skipping.'; fi

      - name: Ensure frontend directory exists
        run: |
          if [ ! -d './frontend' ]; then echo "./frontend directory missing" && exit 1; fi

      - name: Check for index.html in frontend
        run: |
          if [ ! -f './frontend/index.html' ]; then echo "index.html not found in ./frontend" && exit 1; fi

      - name: Lint backend (optional)
        working-directory: ./backend
        run: |
          if command -v flake8 >/dev/null 2>&1; then flake8 .; else echo 'flake8 not installed, skipping lint.'; fi
