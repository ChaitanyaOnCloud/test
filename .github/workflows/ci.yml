name: CI Pipeline

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Verify backend directory exists
        run: |
          if [ ! -d "./backend" ]; then
            echo "ERROR: ./backend directory does not exist!" >&2
            exit 1
          fi
      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'
      - name: Install backend dependencies
        working-directory: ./backend
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
      - name: Run backend tests
        working-directory: ./backend
        run: |
          pytest
      - name: Lint backend
        working-directory: ./backend
        run: |
          pip install flake8
          flake8 .
      - name: Verify frontend directory exists
        run: |
          if [ ! -d "./frontend" ]; then
            echo "ERROR: ./frontend directory does not exist!" >&2
            exit 1
          fi
      - name: Lint frontend HTML
        run: |
          sudo apt-get update && sudo apt-get install -y tidy
          tidy -e ./frontend/*.html || true
