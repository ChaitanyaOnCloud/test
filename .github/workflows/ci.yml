---
name: CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    defaults:
      run:
        shell: bash
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'

      - name: Ensure backend directory exists
        run: |
          if [ ! -d "./backend" ]; then
            echo "Error: ./backend directory does not exist." >&2
            exit 1
          fi

      - name: Install backend dependencies
        working-directory: ./backend
        run: |
          python -m pip install --upgrade pip
          if [ -f requirements.txt ]; then
            pip install -r requirements.txt
          fi

      - name: Run backend tests
        working-directory: ./backend
        run: |
          if [ -f tests/test_main.py ]; then
            python -m unittest discover -s tests
          else
            echo "No backend tests found. Skipping."
          fi

      - name: Check frontend files
        run: |
          if [ ! -f ./frontend/index.html ]; then
            echo "Error: ./frontend/index.html is missing." >&2
            exit 1
          fi
          test -f ./frontend/style.css || echo "Warning: style.css missing"
          test -f ./frontend/app.js || echo "Warning: app.js missing"
