name: CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python 3.10
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'

      - name: Install backend dependencies
        working-directory: ./backend
        run: |
          if [ ! -f requirements.txt ]; then echo 'requirements.txt missing in ./backend'; exit 1; fi
          pip install -r requirements.txt

      - name: Run backend tests
        working-directory: ./backend
        run: |
          if [ -f tests/test_main.py ]; then pytest; else echo 'No tests found'; fi

      - name: Lint backend
        working-directory: ./backend
        run: |
          if [ -f requirements.txt ]; then pip install flake8; fi
          flake8 .

      - name: Check frontend files
        working-directory: ./frontend
        run: |
          ls -l
