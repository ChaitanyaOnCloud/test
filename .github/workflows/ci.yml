name: CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v3

      - name: Set up Python 3.11
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'

      - name: Validate backend directory exists
        run: |
          if [ ! -d "./backend" ]; then
            echo "ERROR: ./backend directory does not exist. Check your repository structure."
            exit 1
          fi

      - name: Install backend dependencies
        working-directory: ./backend
        run: |
          python -m pip install --upgrade pip
          if [ -f requirements.txt ]; then pip install -r requirements.txt; fi

      - name: Run backend tests
        working-directory: ./backend
        run: |
          if [ -f pytest.ini ] || [ -d tests ]; then pytest; else echo 'No tests found.'; fi

      - name: Validate frontend directory exists
        run: |
          if [ ! -d "./frontend" ]; then
            echo "ERROR: ./frontend directory does not exist. Check your repository structure."
            exit 1
          fi

      - name: Lint frontend files
        run: |
          echo 'Linting frontend HTML/CSS/JS files...'
          # Add linter commands here if needed
