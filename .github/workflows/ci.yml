name: CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  build:
    runs-on: ubuntu-latest
    defaults:
      run:
        shell: bash
    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'

      - name: Install backend dependencies
        working-directory: ./backend
        run: |
          pip install -r requirements.txt
          pip install flake8

      - name: Lint backend with flake8
        working-directory: ./backend
        run: |
          flake8 .

      - name: Run backend tests
        working-directory: ./backend
        run: |
          pytest

      # Frontend: No build needed, but can add checks if desired
      - name: Check frontend files exist
        run: |
          test -f ./frontend/index.html
