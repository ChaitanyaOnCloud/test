on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  build:
    runs-on: ubuntu-latest
    defaults:
      run:
        shell: bash
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Validate backend directory exists
        run: |
          test -d ./backend || (echo 'Missing ./backend directory' && exit 1)

      - name: Set up Python 3.11
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'

      - name: Install backend dependencies
        working-directory: ./backend
        run: |
          python -m pip install --upgrade pip
          if [ -f requirements.txt ]; then pip install -r requirements.txt; fi

      - name: Run backend tests
        working-directory: ./backend
        run: |
          if [ -f pytest.ini ] || [ -d tests ]; then pytest; else echo 'No tests found, skipping.'; fi

      - name: Validate frontend files
        run: |
          test -f ./frontend/index.html || (echo 'Missing index.html' && exit 1)
          test -d ./frontend/css || mkdir -p ./frontend/css
          test -d ./frontend/js || mkdir -p ./frontend/js
          echo 'Frontend files validated.'

      - name: Archive frontend (optional)
        if: always()
        run: |
          tar czf frontend.tar.gz -C ./frontend .
