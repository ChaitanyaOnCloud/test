name: CI Pipeline

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  backend:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ./backend
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python 3.10
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'

      - name: Install dependencies
        run: |
          if [ -f requirements.txt ]; then
            python -m pip install --upgrade pip
            pip install -r requirements.txt
          else
            echo "No requirements.txt found. Skipping pip install."
          fi

      - name: Run backend tests
        run: |
          if [ -d tests ]; then
            pytest
          else
            echo "No tests directory found. Skipping tests."
          fi

  frontend:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Validate frontend files
        run: |
          if [ ! -f ./frontend/index.html ]; then
            echo "Missing index.html in frontend directory" && exit 1
          fi
          if [ ! -d ./frontend/css ]; then
            echo "Missing css directory in frontend" && exit 1
          fi
          if [ ! -d ./frontend/js ]; then
            echo "Missing js directory in frontend" && exit 1
          fi
        shell: bash
