name: CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    defaults:
      run:
        shell: bash
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'

      - name: Install backend dependencies
        working-directory: backend
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Lint backend
        working-directory: backend
        run: |
          pip install flake8
          flake8 .

      - name: Run backend tests
        working-directory: backend
        run: |
          pip install pytest
          pytest

      - name: Frontend step
        working-directory: frontend
        run: |
          echo 'No build step required for vanilla frontend.'
          # Optionally add HTML/CSS/JS linters here
