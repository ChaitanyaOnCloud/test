---
name: CI
on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      - name: Set up Python 3.10
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'
      - name: Install backend dependencies
        working-directory: ./backend
        run: |
          python -m pip install --upgrade pip
          if [ -f requirements.txt ]; then pip install -r requirements.txt; fi
      - name: Lint backend
        working-directory: ./backend
        run: |
          if [ -f requirements.txt ]; then pip install flake8; fi
          if [ -d . ]; then flake8 . || true; fi
      - name: Test backend
        working-directory: ./backend
        run: |
          if [ -f requirements.txt ]; then pip install pytest; fi
          if [ -d tests ]; then pytest tests || true; fi
      - name: Check frontend files
        run: |
          test -f ./frontend/index.html
          test -f ./frontend/style.css || true
          test -f ./frontend/app.js || true
