name: CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python 3.10
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'

      - name: Install backend dependencies
        working-directory: ./backend
        run: |
          python -m pip install --upgrade pip
          if [ -f requirements.txt ]; then pip install -r requirements.txt; fi

      - name: Run backend tests
        working-directory: ./backend
        run: |
          if [ -f pytest.ini ] || [ -d tests ]; then pytest; else echo 'No tests found.'; fi

      - name: Check frontend files
        run: |
          test -f ./frontend/index.html
          # Only check for css/js directories if they exist
          if [ -d ./frontend/css ]; then echo 'css directory exists'; else echo 'css directory missing, skipping'; fi
          if [ -d ./frontend/js ]; then echo 'js directory exists'; else echo 'js directory missing, skipping'; fi
