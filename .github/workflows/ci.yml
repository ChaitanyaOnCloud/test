name: CI Pipeline

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  backend:
    name: Backend CI
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ./backend
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run backend tests
        run: |
          pytest

  frontend:
    name: Frontend CI
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ./frontend
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Check frontend directory exists
        run: |
          if [ ! -d "." ]; then
            echo "ERROR: ./frontend directory does not exist!" >&2
            exit 1
          fi

      - name: Lint HTML/CSS/JS
        run: |
          echo "Linting frontend files..."
          # Add your linter commands here, e.g. htmlhint, stylelint, etc.
          # For vanilla JS/HTML/CSS, you may skip or add custom scripts.

