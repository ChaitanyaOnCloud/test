---
name: CI Pipeline

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Validate backend directory exists
        run: |
          if [ ! -d "./backend" ]; then
            echo 'Missing ./backend directory'; exit 1;
          fi

      - name: Validate frontend directory exists
        run: |
          if [ ! -d "./frontend" ]; then
            echo 'Missing ./frontend directory'; exit 1;
          fi

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'

      - name: Install backend dependencies
        working-directory: ./backend
        run: |
          python -m pip install --upgrade pip
          if [ -f requirements.txt ]; then pip install -r requirements.txt; fi

      - name: Run backend tests
        working-directory: ./backend
        run: |
          if [ -f tests ]; then pytest; else echo 'No tests directory found, skipping tests.'; fi

      - name: Archive frontend
        if: success() && always() && (exists('./frontend'))
        run: |
          tar czf frontend.tar.gz -C ./frontend .

      - name: Archive backend
        if: success() && always() && (exists('./backend'))
        run: |
          tar czf backend.tar.gz -C ./backend .
