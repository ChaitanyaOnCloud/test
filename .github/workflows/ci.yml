---
name: CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  build-backend:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ./backend
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
      - name: Run backend tests
        run: |
          pytest

  lint-frontend:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ./frontend
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      - name: Install tidy (HTML linter)
        run: sudo apt-get update && sudo apt-get install -y tidy
      - name: Lint HTML files
        run: |
          if command -v tidy; then tidy -e *.html || true; else echo 'tidy not installed'; fi

  # Optionally, add a job to run all jobs in parallel and require both to pass
  ci-success:
    runs-on: ubuntu-latest
    needs: [build-backend, lint-frontend]
    steps:
      - run: echo "All jobs completed successfully."
