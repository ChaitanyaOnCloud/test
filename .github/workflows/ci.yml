name: CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  build-backend:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ./backend
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
      - name: Lint
        run: |
          pip install flake8
          flake8 .
      - name: Run tests
        run: |
          pip install pytest
          pytest

  build-frontend:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ./frontend
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      - name: Lint HTML/CSS/JS
        run: |
          echo 'No build needed for vanilla frontend. Optionally add linter here.'

  all-success:
    runs-on: ubuntu-latest
    needs: [build-backend, build-frontend]
    steps:
      - name: All jobs succeeded
        run: echo "All jobs completed successfully."
