---
name: CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python 3.10
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'

      - name: Install backend dependencies
        working-directory: ./backend
        run: |
          if [ -f requirements.txt ]; then
            python -m pip install --upgrade pip
            pip install -r requirements.txt
          else
            echo 'No requirements.txt found in ./backend, skipping dependency installation.'
          fi

      - name: Lint backend
        working-directory: ./backend
        run: |
          if [ -f requirements.txt ]; then
            pip install flake8
            flake8 .
          else
            echo 'No requirements.txt found, skipping lint.'
          fi

      - name: Test backend
        working-directory: ./backend
        run: |
          if [ -f requirements.txt ]; then
            pip install pytest
            pytest
          else
            echo 'No requirements.txt found, skipping tests.'
          fi

      - name: Check frontend files
        run: |
          test -f ./frontend/index.html || (echo 'Missing index.html' && exit 1)
          test -f ./frontend/style.css || echo 'Warning: style.css missing.'
          test -f ./frontend/main.js || echo 'Warning: main.js missing.'
