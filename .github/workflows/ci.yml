name: CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    defaults:
      run:
        shell: bash
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python 3.10
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'

      - name: Verify backend directory exists
        run: |
          if [ ! -d './backend' ]; then
            echo "Backend directory missing!"; exit 1;
          fi

      - name: Install backend dependencies
        working-directory: ./backend
        run: |
          python -m pip install --upgrade pip
          if [ -f requirements.txt ]; then pip install -r requirements.txt; fi

      - name: Run backend tests
        working-directory: ./backend
        run: |
          if [ -d tests ]; then pytest; else echo 'No tests directory, skipping.'; fi

      - name: Verify frontend files
        run: |
          if [ ! -f './frontend/index.html' ]; then echo 'Missing index.html'; exit 1; fi
          if [ ! -d './frontend/css' ]; then echo 'Missing css directory'; exit 1; fi
          if [ ! -d './frontend/js' ]; then echo 'Missing js directory'; exit 1; fi

      - name: Lint frontend HTML
        run: |
          echo 'Linting HTML (placeholder)'
