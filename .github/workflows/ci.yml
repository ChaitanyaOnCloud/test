name: CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'

      - name: Install backend dependencies
        working-directory: ./backend
        run: |
          if [ -f requirements.txt ]; then
            python -m pip install --upgrade pip
            pip install -r requirements.txt
          else
            echo 'No requirements.txt found in ./backend.'
          fi

      - name: Run backend tests
        working-directory: ./backend
        run: |
          if [ -f requirements.txt ]; then
            pytest || echo 'No tests found.'
          else
            echo 'No requirements.txt found, skipping tests.'
          fi

      - name: Check frontend files
        run: |
          test -f ./frontend/index.html
          test -d ./frontend/css
          test -d ./frontend/js

      - name: Lint backend (optional)
        working-directory: ./backend
        run: |
          if [ -f requirements.txt ]; then
            pip install flake8
            flake8 . || echo 'Linting issues found.'
          else
            echo 'No requirements.txt found, skipping lint.'
          fi
