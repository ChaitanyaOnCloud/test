---
name: CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python 3.10
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'

      - name: Install backend dependencies
        working-directory: ./backend
        run: |
          python -m pip install --upgrade pip
          if [ -f requirements.txt ]; then pip install -r requirements.txt; fi

      - name: Run backend tests
        working-directory: ./backend
        run: |
          if [ -f pytest.ini ] || [ -d tests ]; then pytest; else echo 'No tests found.'; fi

      - name: Check frontend presence
        run: |
          if [ -d ./frontend ]; then echo 'Frontend directory exists.'; else echo 'Frontend directory missing!'; exit 1; fi

      - name: Lint backend (optional)
        working-directory: ./backend
        run: |
          if [ -f requirements.txt ]; then pip install flake8; fi
          if [ -d . ]; then flake8 . || true; fi
