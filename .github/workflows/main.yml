name: CI

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  backend:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ./backend
    steps:
      - name: Checkout code
        uses: actions/checkout@v3
      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
      - name: Run tests
        run: |
          pytest

  frontend:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ./frontend
    steps:
      - name: Checkout code
        uses: actions/checkout@v3
      - name: Validate HTML
        run: |
          if ! grep -q '<html' index.html; then echo 'Invalid HTML'; exit 1; fi
      - name: Validate CSS
        run: |
          if ! grep -q '{' styles.css; then echo 'Invalid CSS'; exit 1; fi
      - name: Validate JS
        run: |
          if ! grep -q 'function' script.js; then echo 'Invalid JS'; exit 1; fi
