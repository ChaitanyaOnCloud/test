name: CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Set up Python 3.10
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'

      - name: Install backend dependencies
        working-directory: ./backend
        run: |
          pip install -r requirements.txt
          pip install flake8

      - name: Lint backend code
        working-directory: ./backend
        run: flake8 .

      - name: Run backend tests
        working-directory: ./backend
        run: pytest

      - name: Check frontend directory
        run: |
          if [ -d ./frontend ]; then
            echo "Frontend directory exists. Listing files:"
            ls -l ./frontend
          else
            echo "Frontend directory does not exist. Skipping frontend steps."
          fi
