name: CI Pipeline

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Ensure backend directory exists
        run: |
          if [ ! -d ./backend ]; then
            echo 'ERROR: ./backend directory missing';
            exit 1;
          fi

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'

      - name: Install backend dependencies
        working-directory: ./backend
        run: |
          if [ -f requirements.txt ]; then
            pip install -r requirements.txt
          else
            echo 'WARNING: requirements.txt not found in ./backend';
          fi

      - name: Run backend tests
        working-directory: ./backend
        run: |
          if [ -d tests ]; then
            pytest
          else
            echo 'WARNING: tests directory not found in ./backend';
          fi

      - name: Deploy frontend (static)
        run: |
          echo 'Frontend deployment step (static HTML/CSS/JS, no build needed)'
          ls ./frontend
