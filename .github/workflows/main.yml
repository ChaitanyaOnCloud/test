# Example corrected workflow for Python/FastAPI backend and static frontend
name: CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'

      - name: Install backend dependencies
        working-directory: ./backend
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run backend tests
        working-directory: ./backend
        run: |
          pytest

      - name: Lint backend
        working-directory: ./backend
        run: |
          pip install flake8
          flake8 .

      # No npm install or build step for frontend, as it is static
      - name: Check frontend files exist
        run: |
          test -f ./frontend/index.html
          test -d ./frontend/css
          test -d ./frontend/js
