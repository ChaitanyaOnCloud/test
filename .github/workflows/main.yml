name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build-backend:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Ensure backend directory exists
        run: |
          if [ ! -d './backend' ]; then
            echo 'ERROR: ./backend directory missing.'
            exit 1
          fi

      - name: Set up Python 3.11
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'

      - name: Upgrade pip
        run: python -m pip install --upgrade pip
        working-directory: ./backend

      - name: Install backend dependencies
        run: pip install -r requirements.txt
        working-directory: ./backend

      - name: Run backend tests
        run: pytest
        working-directory: ./backend

  build-frontend:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Ensure frontend directory exists
        run: |
          if [ ! -d './frontend' ]; then
            echo 'ERROR: ./frontend directory missing.'
            exit 1
          fi

      - name: Run frontend lint
        run: echo 'No build needed for vanilla HTML/CSS/JS.'
        working-directory: ./frontend

  all-tests:
    needs: [build-backend, build-frontend]
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v3
      - name: Final pipeline status
        run: echo 'All jobs completed successfully.'
