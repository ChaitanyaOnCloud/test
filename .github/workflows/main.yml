name: CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  backend:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ./backend
    steps:
      - name: Checkout code
        uses: actions/checkout@v3
      - name: Set up Python 3.10
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'
      - name: Upgrade pip
        run: python -m pip install --upgrade pip
      - name: Install dependencies
        run: |
          pip install -r requirements.txt
      - name: Run tests
        run: |
          pytest

  frontend:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ./frontend
    steps:
      - name: Checkout code
        uses: actions/checkout@v3
      - name: Validate HTML files
        run: |
          echo "Validating HTML files..."
          if ls *.html 1> /dev/null 2>&1; then echo 'HTML files found.'; else echo 'No HTML files to validate.'; fi
      - name: Validate CSS files
        run: |
          echo "Validating CSS files..."
          if ls *.css 1> /dev/null 2>&1; then echo 'CSS files found.'; else echo 'No CSS files to validate.'; fi
      - name: Validate JS files
        run: |
          echo "Validating JS files..."
          if ls *.js 1> /dev/null 2>&1; then echo 'JS files found.'; else echo 'No JS files to validate.'; fi
