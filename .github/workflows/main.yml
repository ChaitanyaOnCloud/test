name: CI Pipeline

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  backend:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ./backend
    steps:
      - name: Checkout code
        uses: actions/checkout@v3
      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'
      - name: Upgrade pip
        run: python -m pip install --upgrade pip
      - name: Install dependencies
        run: |
          pip install -r requirements.txt
      - name: Run tests
        run: |
          pytest

  frontend:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ./frontend
    steps:
      - name: Checkout code
        uses: actions/checkout@v3
      - name: Check frontend directory exists
        run: test -d ./frontend
      - name: Lint HTML
        run: |
          echo "Linting HTML files..."
          # Add HTML linting commands if needed
      - name: Lint CSS
        run: |
          echo "Linting CSS files..."
          # Add CSS linting commands if needed
      - name: Lint JS
        run: |
          echo "Linting JS files..."
          # Add JS linting commands if needed
