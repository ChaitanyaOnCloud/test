name: CI

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  build-backend:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ./backend
    steps:
      - name: Checkout code
        uses: actions/checkout@v3
      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'
      - name: Upgrade pip
        run: python -m pip install --upgrade pip
      - name: Install dependencies
        run: pip install -r requirements.txt
      - name: Run tests
        run: pytest

  build-frontend:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ./frontend
    steps:
      - name: Checkout code
        uses: actions/checkout@v3
      - name: Validate HTML
        run: echo "Validating HTML files..." # Replace with actual validation if needed
      - name: Validate CSS
        run: echo "Validating CSS files..." # Replace with actual validation if needed
      - name: Validate JS
        run: echo "Validating JS files..." # Replace with actual validation if needed

  all-success:
    needs: [build-backend, build-frontend]
    runs-on: ubuntu-latest
    steps:
      - name: Success
        run: echo "All jobs completed successfully!"