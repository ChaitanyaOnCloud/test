name: CI Pipeline

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

jobs:
  build-backend:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ./backend
    steps:
      - name: Checkout code
        uses: actions/checkout@v3
      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'
      - name: Upgrade pip
        run: python -m pip install --upgrade pip
      - name: Install dependencies
        run: |
          if [ -f requirements.txt ]; then pip install -r requirements.txt; fi
      - name: Run tests
        run: |
          if [ -d tests ]; then pytest tests; else echo 'No tests directory found.'; fi

  check-frontend:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v3
      - name: Verify frontend directory exists
        run: |
          if [ ! -d "./frontend" ]; then echo "ERROR: ./frontend directory does not exist!" >&2; exit 1; fi
      - name: Lint HTML/CSS/JS
        run: |
          echo "Linting frontend files..."
          # Add your linting commands here if needed

  summary:
    runs-on: ubuntu-latest
    needs: [build-backend, check-frontend]
    steps:
      - name: Success summary
        run: echo "CI pipeline completed successfully!"
