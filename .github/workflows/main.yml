name: CI Pipeline

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build-backend:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ./backend
    steps:
      - name: Checkout code
        uses: actions/checkout@v3
      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
      - name: Run tests
        run: |
          pytest

  build-frontend:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ./frontend
    steps:
      - name: Checkout code
        uses: actions/checkout@v3
      - name: Validate frontend directory
        run: |
          if [ ! -d . ]; then echo "ERROR: ./frontend directory does not exist!" >&2; exit 1; fi
      - name: Lint HTML/CSS/JS
        run: |
          echo "Linting frontend files..."
          # Add actual lint commands if needed
      - name: Deploy frontend
        run: |
          echo "Deploying frontend..."
          # Add actual deploy commands if needed

  summary:
    runs-on: ubuntu-latest
    needs: [build-backend, build-frontend]
    steps:
      - name: Checkout code
        uses: actions/checkout@v3
      - name: Summary
        run: echo "CI pipeline completed successfully!"
