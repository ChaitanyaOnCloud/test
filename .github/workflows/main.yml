name: CI

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

jobs:
  build-backend:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ./backend
    steps:
      - name: Checkout code
        uses: actions/checkout@v3
      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
      - name: Run tests
        run: pytest

  build-frontend:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ./frontend
    steps:
      - name: Checkout code
        uses: actions/checkout@v3
      - name: Validate HTML
        run: |
          if [ -f index.html ]; then echo 'HTML file found'; else echo 'No HTML file'; fi
      - name: Validate CSS
        run: |
          if [ -f styles.css ]; then echo 'CSS file found'; else echo 'No CSS file'; fi
      - name: Validate JS
        run: |
          if [ -f app.js ]; then echo 'JS file found'; else echo 'No JS file'; fi

  all-success:
    needs: [build-backend, build-frontend]
    runs-on: ubuntu-latest
    steps:
      - name: Success
        run: echo "All jobs completed successfully!"