name: CI Pipeline

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v3

      - name: Validate backend directory exists
        run: |
          if [ ! -d "./backend" ]; then
            echo "ERROR: ./backend directory does not exist!";
            exit 1;
          fi

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'
        working-directory: ./backend

      - name: Install backend dependencies
        run: |
          python -m pip install --upgrade pip
          if [ -f requirements.txt ]; then pip install -r requirements.txt; fi
        working-directory: ./backend

      - name: Run backend tests
        run: |
          if [ -f tests ]; then pytest tests; else echo "No tests directory found."; fi
        working-directory: ./backend

      - name: Validate frontend directory exists
        run: |
          if [ ! -d "./frontend" ]; then
            echo "ERROR: ./frontend directory does not exist!";
            exit 1;
          fi

      - name: Lint frontend files
        run: |
          echo "Linting HTML/CSS/JS files in ./frontend..."
          # Add linter commands here if needed
        working-directory: ./frontend
