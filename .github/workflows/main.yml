name: CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'

      - name: Install backend dependencies
        run: |
          cd ./backend
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run backend tests
        run: |
          cd ./backend
          pytest

      - name: Lint backend
        run: |
          cd ./backend
          pip install flake8
          flake8 .

      - name: Check frontend static files
        run: |
          test -f ./frontend/index.html
          test -d ./frontend

      # No npm install or npm build steps, as frontend is static
