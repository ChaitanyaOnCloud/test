name: CI/CD Pipeline

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Ensure backend directory exists
        run: |
          if [ ! -d "backend" ]; then
            echo "WARNING: backend directory missing. Creating empty directory."
            mkdir backend
          fi

      - name: Set up Python 3.10
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'

      - name: Install dependencies
        working-directory: ./backend
        run: |
          if [ -f requirements.txt ]; then
            pip install -r requirements.txt
          else
            echo "No requirements.txt found in backend. Skipping dependency install."
          fi

      - name: Run backend tests
        working-directory: ./backend
        run: |
          if [ -d tests ]; then
            pytest tests
          else
            echo "No tests directory found in backend. Skipping tests."
          fi

      - name: Deploy backend
        if: github.ref == 'refs/heads/main'
        working-directory: ./backend
        run: |
          echo "Deploy step placeholder. Implement deployment logic here."

  frontend:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Deploy frontend
        working-directory: ./frontend
        run: |
          echo "Deploy step placeholder. Implement deployment logic here."
