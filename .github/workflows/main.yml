name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build-backend:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ./backend
    steps:
      - name: Checkout code
        uses: actions/checkout@v3
      - name: Set up Python 3.10
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
      - name: Run backend tests
        run: |
          pytest

  check-frontend:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v3
      - name: Check frontend files
        run: |
          test -f ./frontend/index.html
          test -f ./frontend/style.css || true
          test -f ./frontend/main.js || true
      - name: Run frontend lint (optional)
        run: echo 'No build needed for vanilla JS/HTML/CSS.'

  all-success:
    needs: [build-backend, check-frontend]
    runs-on: ubuntu-latest
    steps:
      - name: Success
        run: echo 'All jobs completed successfully.'
