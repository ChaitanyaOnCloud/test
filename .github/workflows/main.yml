name: CI Pipeline

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Ensure backend directory exists
        run: |
          if [ ! -d "./backend" ]; then
            echo "WARNING: ./backend directory missing. Creating stub directory."
            mkdir -p ./backend
          fi

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'

      - name: Install backend dependencies
        working-directory: ./backend
        run: |
          if [ -f "requirements.txt" ]; then
            pip install -r requirements.txt
          else
            echo "No requirements.txt found in ./backend. Skipping dependency install."
          fi

      - name: Run backend tests
        working-directory: ./backend
        run: |
          if [ -f "pytest.ini" ] || [ -d "tests" ]; then
            pytest || echo "No tests found. Skipping."
          else
            echo "No tests found in ./backend. Skipping."
          fi

      - name: Deploy frontend (static)
        run: |
          echo "Frontend directory: ./frontend"
          if [ ! -d "./frontend" ]; then
            echo "WARNING: ./frontend directory missing. Creating stub directory."
            mkdir -p ./frontend
          fi
          echo "No build needed for vanilla HTML/CSS/JS."
