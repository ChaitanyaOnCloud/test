name: CI Pipeline

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v3

      - name: Verify backend directory exists
        run: |
          if [ ! -d "./backend" ]; then
            echo "Backend directory missing! Failing build."
            exit 1
          fi

      - name: Setup Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'
        working-directory: ./backend

      - name: Install backend dependencies
        run: |
          pip install -r requirements.txt
        working-directory: ./backend

      - name: Run backend tests
        run: |
          pytest
        working-directory: ./backend

      - name: Verify frontend directory exists
        run: |
          if [ ! -d "./frontend" ]; then
            echo "Frontend directory missing! Failing build."
            exit 1
          fi

      - name: Run frontend lint
        run: |
          echo "Linting frontend (HTML/CSS/JS)"
          # Add actual lint commands if needed
        working-directory: ./frontend
