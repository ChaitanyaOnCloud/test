name: CI
on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v3
        with:
          fetch-depth: 0
          submodules: true
      - name: Verify backend directory exists
        run: |
          if [ ! -d "./backend" ]; then
            echo "ERROR: ./backend directory missing!"; exit 1;
          fi
      - name: Setup Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'
      - name: Install backend dependencies
        working-directory: ./backend
        run: |
          pip install -r requirements.txt
      - name: Run backend tests
        working-directory: ./backend
        run: |
          pytest
      - name: Deploy frontend (static)
        run: |
          echo "Frontend deployment step (static HTML/CSS/JS)"
          # Add deployment commands here if needed
