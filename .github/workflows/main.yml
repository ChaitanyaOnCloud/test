name: CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  build-backend:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ./backend
    steps:
      - name: Checkout code
        uses: actions/checkout@v3
      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'
      - name: Upgrade pip
        run: python -m pip install --upgrade pip
      - name: Install dependencies
        run: |
          if [ -f requirements.txt ]; then pip install -r requirements.txt; fi
      - name: Run tests
        run: |
          if [ -f test ]; then pytest; fi

  check-frontend:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ./frontend
    steps:
      - name: Checkout code
        uses: actions/checkout@v3
      - name: Check for index.html
        run: |
          if [ ! -f index.html ]; then echo 'Missing index.html in frontend'; exit 1; fi
      - name: Lint HTML
        run: |
          echo 'Linting HTML (placeholder)'

  summary:
    runs-on: ubuntu-latest
    needs: [build-backend, check-frontend]
    steps:
      - name: Checkout code
        uses: actions/checkout@v3
      - name: Success
        run: echo 'CI pipeline completed successfully.'
