name: CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ./backend
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run backend tests
        run: |
          pytest

      - name: Lint backend
        run: |
          pip install flake8
          flake8 .

  frontend-check:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ./frontend
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      - name: Validate HTML files
        run: |
          if command -v tidy; then
            tidy -e *.html || true
          else
            echo 'tidy not installed, skipping HTML validation.'
          fi
      - name: Validate CSS files
        run: |
          if command -v stylelint; then
            stylelint "**/*.css" || true
          else
            echo 'stylelint not installed, skipping CSS validation.'
          fi
