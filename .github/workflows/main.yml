name: CI Pipeline
on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v3
      - name: Ensure backend directory exists
        run: |
          if [ ! -d "./backend" ]; then
            echo "./backend directory does not exist! Creating it."
            mkdir -p ./backend
          fi
      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'
      - name: Install backend dependencies
        run: |
          if [ -d "./backend" ]; then
            pip install -r ./backend/requirements.txt || echo "requirements.txt missing, skipping install"
          fi
      - name: Run backend tests
        run: |
          if [ -d "./backend" ]; then
            pytest ./backend || echo "No tests found in ./backend"
          fi
      - name: Deploy frontend (static)
        run: |
          if [ -d "./frontend" ]; then
            echo "Frontend directory exists. Ready for deployment."
          else
            echo "Frontend directory missing!"
          fi