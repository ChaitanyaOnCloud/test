name: CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      - name: Ensure backend directory exists
        run: |
          if [ ! -d "./backend" ]; then
            echo "ERROR: ./backend directory does not exist. Please check your repository structure." >&2
            exit 1
          fi
      - name: Set up Python 3.11
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'
      - name: Upgrade pip
        run: python -m pip install --upgrade pip
        working-directory: ./backend
      - name: Install dependencies
        run: |
          if [ -f requirements.txt ]; then
            pip install -r requirements.txt
          fi
        working-directory: ./backend
      - name: Run backend tests
        run: |
          if [ -d tests ]; then
            pytest tests
          fi
        working-directory: ./backend
      - name: Lint backend
        run: |
          if [ -f requirements.txt ]; then
            pip install flake8
          fi
          flake8 .
        working-directory: ./backend
      - name: Check frontend files
        run: |
          ls -l ./frontend
