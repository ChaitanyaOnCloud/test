name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Ensure backend directory exists
        run: |
          if [ ! -d "./backend" ]; then
            echo "./backend directory missing. Creating it."
            mkdir -p ./backend
          fi

      - name: Set up Python 3.11
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'

      - name: Install backend dependencies
        working-directory: ./backend
        run: |
          if [ -f "requirements.txt" ]; then
            pip install -r requirements.txt
          else
            echo "No requirements.txt found in ./backend"
          fi

      - name: Run backend tests
        working-directory: ./backend
        run: |
          if [ -f "pytest.ini" ] || [ -d "tests" ]; then
            pytest
          else
            echo "No tests found in ./backend"
          fi

      - name: Deploy frontend (static)
        run: |
          echo "Frontend is static. No build required."
          if [ ! -d "./frontend" ]; then
            echo "./frontend directory missing. Creating it."
            mkdir -p ./frontend
          fi
          # Optionally add deployment steps here
