name: CI/CD Pipeline

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

jobs:
  backend:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v3
      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'
      - name: Install dependencies
        run: pip install -r requirements.txt
        working-directory: ./backend
      - name: Run tests
        run: pytest
        working-directory: ./backend

  frontend:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v3
      - name: Validate static files
        run: |
          ls -l *.html *.css *.js || echo 'No static files found.'
        working-directory: ./frontend
      - name: Deploy frontend
        run: echo 'Deploy step placeholder for static files.'
        working-directory: ./frontend
