name: CI

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
      - name: Set up Python 3.10
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'
      - name: Install dependencies
        run: |
          if [ -d "./backend" ]; then
            cd ./backend
            pip install -r requirements.txt
          else
            echo "WARNING: ./backend directory not found. Skipping backend build."
          fi
      - name: Run backend tests
        run: |
          if [ -d "./backend" ]; then
            cd ./backend
            pytest
          else
            echo "WARNING: ./backend directory not found. Skipping backend tests."
          fi
      - name: Run frontend checks
        run: |
          if [ -d "./frontend" ]; then
            echo "Frontend directory exists. Running checks."
            # Add any frontend checks here
          else
            echo "WARNING: ./frontend directory not found. Skipping frontend checks."
          fi