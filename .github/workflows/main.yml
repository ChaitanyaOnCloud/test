name: CI/CD Pipeline

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

jobs:
  backend:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ./backend
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'
      - name: Install dependencies
        run: pip install -r requirements.txt
      - name: Run tests
        run: pytest
      - name: Build and deploy (optional)
        if: github.ref == 'refs/heads/main'
        run: echo 'Deploy backend here'

  frontend:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ./frontend
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      - name: Validate HTML/CSS/JS
        run: |
          echo 'No build required for vanilla frontend.'
          # Optionally add HTML/CSS/JS linting here
      - name: Deploy frontend (optional)
        if: github.ref == 'refs/heads/main'
        run: echo 'Deploy frontend here'
