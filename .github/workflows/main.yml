name: CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Ensure backend directory exists
        run: |
          if [ ! -d "./backend" ]; then
            echo "ERROR: ./backend directory does not exist. Check your repository structure."
            exit 1
          fi

      - name: Set up Python 3.11
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'

      - name: Install backend dependencies
        working-directory: ./backend
        run: |
          if [ -f "requirements.txt" ]; then
            pip install -r requirements.txt
          else
            echo "No requirements.txt found in ./backend. Skipping dependency installation."
          fi

      - name: Run backend tests
        working-directory: ./backend
        run: |
          if [ -f "tests" ]; then
            pytest
          else
            echo "No tests directory found in ./backend. Skipping tests."
          fi

      - name: Validate frontend directory
        run: |
          if [ ! -d "./frontend" ]; then
            echo "ERROR: ./frontend directory does not exist. Check your repository structure."
            exit 1
          fi

      - name: Lint frontend files
        run: |
          echo "Linting HTML/CSS/JS in ./frontend (no npm build required)"
          # Add your linting commands here if needed
