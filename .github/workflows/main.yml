name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  backend:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ./backend
    steps:
      - name: Checkout code
        uses: actions/checkout@v3
      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'
      - name: Upgrade pip
        run: python -m pip install --upgrade pip
      - name: Install dependencies
        run: pip install -r requirements.txt
      - name: Lint with flake8
        run: pip install flake8 && flake8 .
      - name: Run tests
        run: pytest

  frontend:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ./frontend
    steps:
      - name: Checkout code
        uses: actions/checkout@v3
      - name: Check for HTML files
        run: |
          if ls *.html 1> /dev/null 2>&1; then echo "HTML files found"; else echo "No HTML files found"; fi
      - name: Check for CSS files
        run: |
          if ls *.css 1> /dev/null 2>&1; then echo "CSS files found"; else echo "No CSS files found"; fi
      - name: Check for JS files
        run: |
          if ls *.js 1> /dev/null 2>&1; then echo "JS files found"; else echo "No JS files found"; fi
