name: CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v3

      - name: Ensure backend directory exists
        run: |
          if [ ! -d "./backend" ]; then
            echo "Backend directory missing! Creating it."
            mkdir -p ./backend
          fi

      - name: Set up Python 3.10
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'

      - name: Install backend dependencies
        if: ${{ exists('backend/requirements.txt') }}
        run: |
          pip install -r ./backend/requirements.txt

      - name: Run backend tests
        if: ${{ exists('backend') }}
        run: |
          cd ./backend
          pytest || echo "No tests found or backend missing."

      - name: Deploy frontend
        run: |
          echo "Deploying frontend (static HTML/CSS/JS)"
          # Add deployment commands here if needed
