name: CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  build-backend:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ./backend
    steps:
      - name: Checkout code
        uses: actions/checkout@v3
      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'
      - name: Upgrade pip
        run: python -m pip install --upgrade pip
      - name: Install dependencies
        run: |
          if [ -f requirements.txt ]; then pip install -r requirements.txt; fi
      - name: Run tests
        run: |
          if [ -f pytest.ini ] || [ -d tests ]; then pytest; fi

  build-frontend:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ./frontend
    steps:
      - name: Checkout code
        uses: actions/checkout@v3
      - name: Validate HTML
        run: |
          if [ -f index.html ]; then echo 'HTML exists'; else echo 'Missing index.html' && exit 1; fi
      - name: Validate CSS
        run: |
          if [ -f styles.css ]; then echo 'CSS exists'; else echo 'Missing styles.css' && exit 1; fi
      - name: Validate JS
        run: |
          if [ -f app.js ]; then echo 'JS exists'; else echo 'Missing app.js' && exit 1; fi

  all-success:
    runs-on: ubuntu-latest
    needs: [build-backend, build-frontend]
    steps:
      - name: All jobs succeeded
        run: echo "CI pipeline completed successfully!"