name: CI

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

jobs:
  backend:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ./backend
    steps:
      - name: Checkout code
        uses: actions/checkout@v3
      - name: Set up Python 3.11
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          if [ -f requirements.txt ]; then pip install -r requirements.txt; fi
      - name: Run backend tests
        run: |
          if [ -f test_backend.py ]; then pytest test_backend.py; else echo 'No backend tests found.'; fi

  frontend:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v3
      - name: Validate frontend files
        run: |
          test -f ./frontend/index.html || (echo 'Missing index.html' && exit 1)
          test -d ./frontend/css || mkdir -p ./frontend/css
          test -d ./frontend/js || mkdir -p ./frontend/js
          echo 'Frontend files validated.'
      - name: Run frontend tests
        run: |
          echo 'No frontend build or tests required.'

  all-success:
    needs: [backend, frontend]
    runs-on: ubuntu-latest
    steps:
      - name: All jobs succeeded
        run: echo 'CI pipeline completed successfully.'
