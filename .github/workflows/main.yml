name: CI/CD Pipeline

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

jobs:
  backend:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v3
      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'
      - name: Install dependencies
        run: cd ./backend && pip install -r requirements.txt
      - name: Run tests
        run: cd ./backend && pytest

  frontend:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v3
      - name: Validate static files
        run: |
          cd ./frontend
          ls -l *.html *.css *.js || echo 'No static files found.'
      - name: Deploy frontend
        run: |
          cd ./frontend
          echo 'Deploy step placeholder for static files.'
