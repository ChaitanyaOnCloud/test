name: CI Pipeline

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Ensure backend directory exists
        run: |
          if [ ! -d "./backend" ]; then
            echo "WARNING: ./backend directory does not exist. Creating empty directory for pipeline continuity."
            mkdir -p ./backend
          fi

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'

      - name: Install backend dependencies
        working-directory: ./backend
        run: |
          if [ -f requirements.txt ]; then
            pip install -r requirements.txt
          else
            echo "No requirements.txt found in ./backend. Skipping dependency installation."
          fi

      - name: Run backend tests
        working-directory: ./backend
        run: |
          if [ -f test ]; then
            pytest
          else
            echo "No tests found in ./backend. Skipping tests."
          fi

      - name: Deploy frontend (static HTML/CSS/JS)
        run: |
          echo "Frontend directory ./frontend detected. No build required for static files."
          ls ./frontend
