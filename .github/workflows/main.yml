name: CI/CD Pipeline

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Ensure backend directory exists
        run: |
          if [ ! -d "./backend" ]; then
            echo "ERROR: ./backend directory missing. Please check your repository structure."
            exit 1
          fi

      - name: Set up Python 3.10
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'

      - name: Install backend dependencies
        working-directory: ./backend
        run: |
          if [ -f requirements.txt ]; then
            pip install -r requirements.txt
          else
            echo "No requirements.txt found in ./backend"
          fi

      - name: Run backend tests
        working-directory: ./backend
        run: |
          if [ -d tests ]; then
            pytest tests
          else
            echo "No tests directory found in ./backend"
          fi

      - name: Deploy frontend (static)
        run: |
          echo "Frontend is static HTML/CSS/JS, no build needed."
          ls ./frontend
