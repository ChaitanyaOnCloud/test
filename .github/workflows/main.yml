name: CI Pipeline

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

jobs:
  backend-tests:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ./backend
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      - name: Set up Python 3.11
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
      - name: Run tests
        run: |
          pytest

  frontend-validation:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      - name: Validate HTML files
        run: |
          if [ -d ./frontend ]; then
            find ./frontend -name '*.html' -exec echo "Validating {}" \;
          else
            echo "No frontend directory found. Skipping validation."
          fi

  build-summary:
    runs-on: ubuntu-latest
    needs: [backend-tests, frontend-validation]
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      - name: Build Summary
        run: echo "Build completed successfully!"
