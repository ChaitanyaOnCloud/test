name: CI

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

jobs:
  build-backend:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ./backend
    steps:
      - name: Checkout code
        uses: actions/checkout@v3
      - name: Set up Python 3.10
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
      - name: Run tests
        run: |
          pytest

  validate-frontend:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ./frontend
    steps:
      - name: Checkout code
        uses: actions/checkout@v3
      - name: Install tidy
        run: sudo apt-get update && sudo apt-get install -y tidy
      - name: Validate HTML
        run: |
          if command -v tidy; then tidy -e *.html; else echo 'tidy not installed, skipping HTML validation.'; fi

  all-success:
    needs: [build-backend, validate-frontend]
    runs-on: ubuntu-latest
    steps:
      - name: Success
        run: echo 'CI pipeline completed successfully.'
