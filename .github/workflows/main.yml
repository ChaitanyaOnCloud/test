name: CI Pipeline

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Ensure backend directory exists
        run: |
          if [ ! -d "./backend" ]; then
            echo "ERROR: ./backend directory does not exist. Please check your repository structure." >&2
            exit 1
          fi

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'

      - name: Install backend dependencies
        working-directory: ./backend
        run: |
          if [ -f requirements.txt ]; then
            pip install -r requirements.txt
          else
            echo "WARNING: requirements.txt not found in ./backend. Skipping dependency installation."
          fi

      - name: Run backend tests
        working-directory: ./backend
        run: |
          if [ -d tests ]; then
            pytest tests
          else
            echo "WARNING: tests directory not found in ./backend. Skipping tests."
          fi

      - name: Validate frontend directory
        run: |
          if [ ! -d "./frontend" ]; then
            echo "ERROR: ./frontend directory does not exist. Please check your repository structure." >&2
            exit 1
          fi

      - name: Check frontend files
        run: |
          if [ ! -f "./frontend/index.html" ]; then
            echo "WARNING: index.html not found in ./frontend."
          fi
          if [ ! -f "./frontend/style.css" ]; then
            echo "WARNING: style.css not found in ./frontend."
          fi
          if [ ! -f "./frontend/app.js" ]; then
            echo "WARNING: app.js not found in ./frontend."
          fi

      - name: Complete pipeline
        run: echo "CI pipeline completed successfully."