name: CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Verify backend directory exists
        run: |
          if [ ! -d "./backend" ]; then
            echo "ERROR: ./backend directory missing!" >&2
            exit 1
          fi

      - name: Set up Python 3.10
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'

      - name: Install backend dependencies
        working-directory: ./backend
        run: |
          if [ -f requirements.txt ]; then
            pip install -r requirements.txt
          fi

      - name: Run backend tests
        working-directory: ./backend
        run: |
          if [ -f requirements.txt ]; then
            pytest
          else
            echo "No requirements.txt found, skipping tests."
          fi

      - name: Lint backend
        working-directory: ./backend
        run: |
          if [ -f requirements.txt ]; then
            pip install flake8
            flake8 .
          fi

      - name: Frontend HTML validation
        working-directory: ./frontend
        run: |
          if ls *.html 1> /dev/null 2>&1; then
            echo "HTML files found. (Add validation here if needed)"
          else
            echo "No HTML files found in ./frontend."
          fi
