name: CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Ensure backend directory exists
        run: |
          if [ ! -d "./backend" ]; then
            echo "ERROR: ./backend directory does not exist."
            exit 1
          fi

      - name: Set up Python 3.10
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'

      - name: Install backend dependencies
        working-directory: ./backend
        run: |
          if [ -f requirements.txt ]; then
            pip install -r requirements.txt
          fi

      - name: Run backend tests
        working-directory: ./backend
        run: |
          if [ -f requirements.txt ]; then
            pytest
          else
            echo "No requirements.txt found, skipping tests."
          fi

      - name: Lint backend
        working-directory: ./backend
        run: |
          if [ -f requirements.txt ]; then
            pip install flake8
            flake8 .
          else
            echo "No requirements.txt found, skipping lint."
          fi

      - name: Frontend check
        run: |
          if [ ! -d "./frontend" ]; then
            echo "ERROR: ./frontend directory does not exist."
            exit 1
          fi
          echo "Frontend directory exists. No build needed."
