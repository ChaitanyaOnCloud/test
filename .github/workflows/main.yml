name: CI Pipeline

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

jobs:
  build-backend:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Ensure backend directory exists
        run: |
          if [ ! -d './backend' ]; then
            echo 'ERROR: ./backend directory missing. Please ensure the backend directory exists and is checked in.'
            exit 1
          fi

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'

      - name: Install backend dependencies
        run: |
          cd ./backend
          if [ -f requirements.txt ]; then
            pip install -r requirements.txt
          fi

      - name: Run backend tests
        run: |
          cd ./backend
          if [ -d tests ]; then
            pytest
          else
            echo 'No tests directory found.'
          fi

  build-frontend:
    runs-on: ubuntu-latest
    needs: build-backend
    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Ensure frontend directory exists
        run: |
          if [ ! -d './frontend' ]; then
            echo 'ERROR: ./frontend directory missing. Please ensure the frontend directory exists and is checked in.'
            exit 1
          fi

      - name: Validate frontend files
        run: |
          cd ./frontend
          if [ -f index.html ]; then
            echo 'index.html found.'
          else
            echo 'index.html missing.'
            exit 1
          fi

      - name: Run basic HTML lint
        run: |
          if command -v tidy >/dev/null 2>&1; then
            tidy -e ./frontend/index.html || true
          else
            echo 'tidy not installed, skipping HTML lint.'
          fi
