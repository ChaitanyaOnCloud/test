name: CI Pipeline

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

jobs:
  build-backend:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ./backend
    steps:
      - name: Checkout code
        uses: actions/checkout@v3
      - name: Set up Python 3.10
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
      - name: Run tests
        run: |
          pytest

  build-frontend:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ./frontend
    steps:
      - name: Checkout code
        uses: actions/checkout@v3
      - name: Validate HTML
        run: |
          if [ -f index.html ]; then echo 'HTML file exists'; else echo 'Missing index.html'; exit 1; fi
      - name: Validate CSS
        run: |
          if [ -f styles.css ]; then echo 'CSS file exists'; else echo 'Missing styles.css'; exit 1; fi
      - name: Validate JS
        run: |
          if [ -f app.js ]; then echo 'JS file exists'; else echo 'Missing app.js'; exit 1; fi

  summary:
    runs-on: ubuntu-latest
    needs: [build-backend, build-frontend]
    steps:
      - name: Success
        run: echo "CI pipeline completed successfully!"