name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  backend:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ./backend
    steps:
      - name: Checkout code
        uses: actions/checkout@v3
      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'
      - name: Install dependencies
        run: |
          if [ -f requirements.txt ]; then
            pip install -r requirements.txt
          else
            echo 'requirements.txt not found.'
          fi
      - name: Lint
        run: |
          if [ -f requirements.txt ]; then
            pip install flake8
            flake8 .
          else
            echo 'Skipping lint: requirements.txt not found.'
          fi
      - name: Test
        run: |
          if [ -d tests ]; then
            pip install pytest
            pytest tests
          else
            echo 'No tests directory found.'
          fi

  frontend:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ./frontend
    steps:
      - name: Checkout code
        uses: actions/checkout@v3
      - name: Frontend validation
        run: echo 'No build/lint steps defined for vanilla frontend.'
