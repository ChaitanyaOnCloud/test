name: CI Pipeline

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Ensure backend directory exists
        run: |
          if [ ! -d ./backend ]; then
            echo 'Backend directory missing! Creating...';
            mkdir -p ./backend
          fi

      - name: Setup Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'

      - name: Install backend dependencies
        working-directory: ./backend
        run: |
          if [ -f requirements.txt ]; then
            pip install -r requirements.txt
          else
            echo 'No requirements.txt found.'
          fi

      - name: Run backend tests
        working-directory: ./backend
        run: |
          if [ -f pytest.ini ] || [ -d tests ]; then
            pytest || echo 'No tests found.'
          else
            echo 'No tests directory or pytest.ini found.'
          fi

      - name: Deploy backend (optional)
        if: github.ref == 'refs/heads/main'
        working-directory: ./backend
        run: |
          echo 'Deploy step placeholder.'

  frontend:
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Validate frontend directory
        run: |
          if [ ! -d ./frontend ]; then
            echo 'Frontend directory missing!'; exit 1;
          fi

      - name: Deploy frontend (optional)
        if: github.ref == 'refs/heads/main'
        working-directory: ./frontend
        run: |
          echo 'Deploy step placeholder.'
