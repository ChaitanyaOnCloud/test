name: CI Pipeline

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v3

      - name: Validate backend directory exists
        run: |
          if [ ! -d "./backend" ]; then
            echo "ERROR: ./backend directory does not exist. Please check your repository structure."
            exit 1
          fi

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'

      - name: Install backend dependencies
        working-directory: ./backend
        run: |
          python -m pip install --upgrade pip
          if [ -f requirements.txt ]; then pip install -r requirements.txt; fi

      - name: Run backend tests
        working-directory: ./backend
        run: |
          if [ -f pytest.ini ] || [ -d tests ]; then pytest; else echo "No tests found."; fi

      - name: Lint backend
        working-directory: ./backend
        run: |
          if [ -f requirements.txt ]; then pip install flake8; fi
          flake8 .

      - name: Validate frontend directory exists
        run: |
          if [ ! -d "./frontend" ]; then
            echo "ERROR: ./frontend directory does not exist. Please check your repository structure."
            exit 1
          fi

      - name: Lint frontend (HTML/CSS/JS)
        run: |
          echo "No npm build needed. Consider adding HTML/CSS/JS linters if desired."
