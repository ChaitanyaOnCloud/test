name: CI Pipeline

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

jobs:
  build-backend:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ./backend
    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Set up Python 3.10
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'

      - name: Install dependencies
        run: |
          if [ -f requirements.txt ]; then
            pip install -r requirements.txt
          else
            echo "requirements.txt not found in ./backend" && exit 1
          fi

      - name: Run backend tests
        run: |
          if [ -d tests ]; then
            pytest tests
          else
            echo "No tests directory found in ./backend" && exit 0
          fi

  check-frontend:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Validate frontend structure
        run: |
          if [ ! -f ./frontend/index.html ]; then
            echo "Missing index.html in frontend directory" && exit 1
          fi
          if [ ! -d ./frontend/css ]; then
            echo "Missing css directory in frontend" && exit 1
          fi
          if [ ! -d ./frontend/js ]; then
            echo "Missing js directory in frontend" && exit 1
          fi

      - name: Lint HTML/CSS/JS
        run: |
          echo "Linting frontend files (placeholder)"
          # Add actual lint commands if needed

  summary:
    runs-on: ubuntu-latest
    needs: [build-backend, check-frontend]
    steps:
      - name: Success summary
        run: echo "CI pipeline completed successfully!"
