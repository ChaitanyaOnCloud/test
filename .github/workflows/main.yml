name: CI Pipeline

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

jobs:
  build-backend:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ./backend
    steps:
      - name: Checkout code
        uses: actions/checkout@v3
      - name: Ensure backend directory exists
        run: |
          if [ ! -d ./backend ]; then
            echo 'Backend directory missing.'
            exit 1
          fi
      - name: Set up Python 3.10
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'
      - name: Install dependencies
        run: |
          if [ -f requirements.txt ]; then
            pip install -r requirements.txt
          else
            echo 'No requirements.txt found.'
          fi
      - name: Run backend tests
        run: |
          if [ -f test_main.py ]; then
            pytest test_main.py
          else
            echo 'No backend tests found.'
          fi

  build-frontend:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ./frontend
    steps:
      - name: Checkout code
        uses: actions/checkout@v3
      - name: Ensure frontend directory exists
        run: |
          if [ ! -d ./frontend ]; then
            echo 'Frontend directory missing.'
            exit 1
          fi
      - name: No build needed for vanilla frontend
        run: echo 'No build needed for vanilla frontend.'
      - name: Run frontend tests
        run: |
          if [ -f test_frontend.sh ]; then
            bash test_frontend.sh
          else
            echo 'No frontend tests found.'
          fi

  summary:
    runs-on: ubuntu-latest
    needs: [build-backend, build-frontend]
    steps:
      - name: Checkout code
        uses: actions/checkout@v3
      - name: CI Pipeline completed
        run: echo 'CI Pipeline completed successfully.'
