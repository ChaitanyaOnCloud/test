name: CI Pipeline

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  build-backend:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ./backend
    steps:
      - name: Checkout code
        uses: actions/checkout@v3
      - name: Set up Python 3.10
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'
      - name: Upgrade pip
        run: python -m pip install --upgrade pip
      - name: Install dependencies
        run: |
          pip install -r requirements.txt
      - name: Run tests
        run: |
          pytest

  check-frontend:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v3
      - name: Check frontend files
        run: |
          test -f ./frontend/index.html || echo 'index.html missing'
          test -f ./frontend/style.css || echo 'style.css missing'
          test -f ./frontend/main.js || echo 'main.js missing'

  summary:
    runs-on: ubuntu-latest
    needs: [build-backend, check-frontend]
    steps:
      - name: Checkout code
        uses: actions/checkout@v3
      - name: Print summary
        run: echo "CI pipeline completed successfully!"
