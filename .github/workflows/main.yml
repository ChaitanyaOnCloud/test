name: CI Pipeline

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build-backend:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ./backend
    steps:
      - name: Checkout code
        uses: actions/checkout@v3
      - name: Ensure backend directory exists
        run: |
          if [ ! -d ./backend ]; then
            echo 'Backend directory missing!'; exit 1;
          fi
      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'
      - name: Upgrade pip
        run: python -m pip install --upgrade pip
      - name: Install dependencies
        run: |
          if [ -f requirements.txt ]; then
            pip install -r requirements.txt
          else
            echo 'requirements.txt not found'; exit 1;
          fi
      - name: Run backend tests
        run: |
          if [ -f test_main.py ]; then
            python -m pytest test_main.py
          else
            echo 'test_main.py not found'; exit 1;
          fi

  build-frontend:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ./frontend
    steps:
      - name: Checkout code
        uses: actions/checkout@v3
      - name: Ensure frontend directory exists
        run: |
          if [ ! -d ./frontend ]; then
            echo 'Frontend directory missing!'; exit 1;
          fi
      - name: List frontend files
        run: ls -al
      - name: Run basic HTML validation
        run: |
          if [ -f index.html ]; then
            echo 'index.html found'; else echo 'index.html missing'; exit 1; fi

  summary:
    runs-on: ubuntu-latest
    needs: [build-backend, build-frontend]
    steps:
      - name: Checkout code
        uses: actions/checkout@v3
      - name: Success summary
        run: echo 'CI pipeline completed successfully.'
