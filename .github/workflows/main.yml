name: CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  backend-test:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ./backend
    steps:
      - name: Checkout code
        uses: actions/checkout@v3
      - name: Set up Python 3.11
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
      - name: Run tests
        run: pytest

  frontend-lint:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ./frontend
    steps:
      - name: Checkout code
        uses: actions/checkout@v3
      - name: Lint HTML/CSS/JS
        run: |
          echo "Linting frontend files..."
          # Add actual lint commands if needed, e.g. htmlhint, stylelint, eslint
          # For vanilla JS/HTML/CSS, you may skip or use custom scripts

  build:
    runs-on: ubuntu-latest
    needs: [backend-test, frontend-lint]
    steps:
      - name: Checkout code
        uses: actions/checkout@v3
      - name: Build summary
        run: echo "Build completed successfully!"
