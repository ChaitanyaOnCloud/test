name: CI Pipeline

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

jobs:
  build-backend:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ./backend
    steps:
      - name: Checkout code
        uses: actions/checkout@v3
      - name: Ensure backend directory exists
        run: |
          if [ ! -d './backend' ]; then
            echo "ERROR: ./backend directory does not exist."
            exit 1
          fi
      - name: Set up Python 3.11
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'
      - name: Upgrade pip
        run: python -m pip install --upgrade pip
      - name: Install dependencies
        run: |
          if [ -f requirements.txt ]; then
            pip install -r requirements.txt
          else
            echo "No requirements.txt found. Skipping dependency install."
          fi
      - name: Run tests
        run: |
          if [ -f test ]; then
            pytest
          else
            echo "No tests found. Skipping."
          fi

  build-frontend:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ./frontend
    steps:
      - name: Checkout code
        uses: actions/checkout@v3
      - name: Ensure frontend directory exists
        run: |
          if [ ! -d './frontend' ]; then
            echo "ERROR: ./frontend directory does not exist."
            exit 1
          fi
      - name: Validate HTML/CSS/JS
        run: |
          echo "Validating frontend files..."
          # Add custom validation commands if needed
      - name: Archive frontend
        run: |
          zip -r ../frontend.zip .

  summary:
    runs-on: ubuntu-latest
    needs: [build-backend, build-frontend]
    steps:
      - name: Checkout code
        uses: actions/checkout@v3
      - name: Print summary
        run: echo "CI pipeline completed successfully!"
