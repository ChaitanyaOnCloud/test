name: CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
        working-directory: ./backend

      - name: Run backend tests
        run: |
          pytest
        working-directory: ./backend

      - name: Lint backend
        run: |
          pip install flake8
          flake8 .
        working-directory: ./backend

  frontend-check:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Validate HTML
        run: |
          if command -v tidy; then tidy -e *.html; else echo 'tidy not installed, skipping HTML validation.'; fi
        working-directory: ./frontend

      - name: Validate CSS
        run: |
          if command -v stylelint; then stylelint "**/*.css" || true; else echo 'stylelint not installed, skipping CSS validation.'; fi
        working-directory: ./frontend
