name: CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Set up Python 3.10
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'

      - name: Install backend dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
        working-directory: ./backend

      - name: Run backend tests
        run: pytest
        working-directory: ./backend

      - name: Lint backend
        run: flake8 .
        working-directory: ./backend

      # No npm install or npm build steps needed for frontend
      - name: Copy frontend files (if needed)
        run: echo "No frontend build step required."
