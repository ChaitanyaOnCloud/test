name: CI Pipeline

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build-backend:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ./backend
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
      - name: Run backend tests
        run: pytest

  lint-frontend:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ./frontend
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      - name: Lint frontend files
        run: |
          echo "Linting frontend files..."
          # Add actual lint commands if needed, e.g. htmlhint, stylelint, eslint
          # For vanilla JS/HTML/CSS, you may skip or use custom scripts

  summary:
    runs-on: ubuntu-latest
    needs: [build-backend, lint-frontend]
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      - name: Summary
        run: echo "CI pipeline completed successfully!"