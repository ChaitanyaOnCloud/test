name: CI

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'

      - name: Install backend dependencies
        working-directory: ./backend
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run backend tests
        working-directory: ./backend
        run: |
          pytest

      - name: Deploy (example step)
        run: echo "Deployment step placeholder"

      # No npm install or build steps needed for frontend
      # Frontend is vanilla HTML/CSS/JS, so just check for existence
      - name: Verify frontend files
        run: |
          test -f ./frontend/index.html
          test -f ./frontend/style.css
