name: CI Pipeline

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Verify backend directory exists
        run: |
          if [ ! -d "./backend" ]; then
            echo "Backend directory missing! Failing build.";
            exit 1;
          fi

      - name: Verify frontend directory exists
        run: |
          if [ ! -d "./frontend" ]; then
            echo "Frontend directory missing! Failing build.";
            exit 1;
          fi

      - name: Setup Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'

      - name: Install backend dependencies
        working-directory: ./backend
        run: |
          python -m pip install --upgrade pip
          if [ -f requirements.txt ]; then
            pip install -r requirements.txt
          fi

      - name: Run backend tests
        working-directory: ./backend
        run: |
          if [ -d tests ]; then
            pytest tests
          else
            echo "No tests directory found in backend. Skipping tests."
          fi

      - name: Run frontend checks
        working-directory: ./frontend
        run: |
          echo "Frontend directory present. No build required for vanilla HTML/CSS/JS."
