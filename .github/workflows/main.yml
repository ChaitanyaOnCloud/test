name: CI Pipeline

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v3
        with:
          submodules: recursive
      - name: Verify backend directory exists
        run: |
          if [ ! -d "./backend" ]; then
            echo "Backend directory missing! Failing build.";
            exit 1;
          fi
      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'
      - name: Install backend dependencies
        working-directory: ./backend
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
      - name: Run backend tests
        working-directory: ./backend
        run: |
          pytest
      - name: Lint backend
        working-directory: ./backend
        run: |
          flake8 .
      - name: Check frontend directory exists
        run: |
          if [ ! -d "./frontend" ]; then
            echo "Frontend directory missing! Failing build.";
            exit 1;
          fi
      - name: Lint frontend
        run: |
          echo "Linting frontend (HTML/CSS/JS)"
          # Add linter commands here if needed
