name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Verify backend directory exists
        run: |
          if [ ! -d "./backend" ]; then
            echo "ERROR: ./backend directory does not exist!" >&2
            exit 1
          fi

      - name: Setup Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'

      - name: Install backend dependencies
        working-directory: ./backend
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run backend tests
        working-directory: ./backend
        run: |
          pytest

      - name: Verify frontend directory exists
        run: |
          if [ ! -d "./frontend" ]; then
            echo "ERROR: ./frontend directory does not exist!" >&2
            exit 1
          fi

      - name: Run frontend lint
        working-directory: ./frontend
        run: |
          echo "Linting frontend (HTML/CSS/JS)"
          # Add lint commands here if needed
