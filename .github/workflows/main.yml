name: CI
on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v3
      - name: Ensure backend directory exists
        run: |
          if [ ! -d './backend' ]; then
            echo "Error: ./backend directory missing."
            exit 1
          fi
      - name: Set up Python 3.10
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'
      - name: Upgrade pip
        working-directory: ./backend
        run: python -m pip install --upgrade pip
      - name: Install backend dependencies
        working-directory: ./backend
        run: |
          if [ -f requirements.txt ]; then
            pip install -r requirements.txt
          else
            echo "requirements.txt not found in ./backend"
            exit 1
          fi
      - name: Run backend tests
        working-directory: ./backend
        run: |
          if [ -d tests ]; then
            pytest tests
          else
            echo "tests directory not found in ./backend"
            exit 1
          fi
      - name: Deploy frontend (static HTML/CSS/JS)
        run: echo "Frontend deployment step (no build required)"
