name: CI/CD Pipeline

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Ensure backend directory exists
        run: |
          if [ ! -d "./backend" ]; then
            echo "Backend directory missing. Creating empty backend directory."
            mkdir ./backend
          fi

      - name: Set up Python 3.10
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'

      - name: Install backend dependencies
        working-directory: ./backend
        run: |
          if [ -f requirements.txt ]; then
            pip install -r requirements.txt
          else
            echo "No requirements.txt found in backend. Skipping install."
          fi

      - name: Run backend tests
        working-directory: ./backend
        run: |
          if [ -d tests ]; then
            pytest tests || true
          else
            echo "No tests directory found in backend. Skipping tests."
          fi

      - name: Deploy backend
        working-directory: ./backend
        run: |
          echo "Deploy step placeholder."

      - name: Deploy frontend
        working-directory: ./frontend
        run: |
          echo "Deploy frontend step placeholder."
