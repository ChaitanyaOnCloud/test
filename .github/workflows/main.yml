name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  backend:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ./backend
    steps:
      - name: Checkout code
        uses: actions/checkout@v3
      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'
      - name: Install dependencies
        run: |
          if [ -f requirements.txt ]; then
            pip install -r requirements.txt
          else
            echo 'requirements.txt not found.'
            exit 1
          fi
      - name: Run tests
        run: |
          if [ -d tests ]; then
            pytest tests
          else
            echo 'No tests directory found.'
          fi

  frontend:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ./frontend
    steps:
      - name: Checkout code
        uses: actions/checkout@v3
      - name: Validate frontend directory
        run: |
          if [ -d . ]; then
            echo 'No build needed for vanilla frontend.'
          else
            echo 'Frontend directory missing.'
            exit 1
          fi
      - name: Lint HTML/CSS/JS
        run: |
          echo 'Linting frontend files...'
          # Add actual lint commands if needed

