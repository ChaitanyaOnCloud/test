name: CI Pipeline

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  backend-tests:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ./backend
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
      - name: Run tests
        run: pytest
    timeout-minutes: 15

  frontend-check:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ./frontend
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      - name: Validate HTML
        run: |
          if ! grep -q '<html' index.html; then echo 'Missing <html> tag'; exit 1; fi
      - name: Validate CSS
        run: |
          if ! grep -q '{' styles.css; then echo 'Malformed CSS'; exit 1; fi
    timeout-minutes: 10

  build-summary:
    runs-on: ubuntu-latest
    needs: [backend-tests, frontend-check]
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      - name: Build summary
        run: echo "Build completed successfully."
    timeout-minutes: 5
