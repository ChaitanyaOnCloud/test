
name: DevOps CI Pipeline

on:
  push:
    branches: [ "main", "develop" ]
  pull_request:
    branches: [ "main" ]

env:
  NODE_ENV: production
  APP_PORT: 3000
  # ERROR 1: Secret name might not exist
  DB_PASSWORD: ${{ secrets.DB_PASS }}

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v2

      - name: Use Node.js
        uses: actions/setup-node@v3
        with:
          node-version: 18

      - name: Install Dependencies
        run: npm install

      # ERROR 2: Wrong script name (may not exist in package.json)
      - name: Run Build
        run: npm run build-app

      # ERROR 3: Missing environment variable reference
      - name: Print App Port
        run: echo "App running on $PORT"

  test:
    runs-on: ubuntu-latest
    needs: build

    steps:
      - name: Checkout Code
        uses: actions/checkout@v2

      # ERROR 4: Node not installed in this job
      - name: Run Tests
        run: npm test

  docker:
    runs-on: ubuntu-latest
    needs: test

    steps:
      - name: Checkout Code
        uses: actions/checkout@v2

      # ERROR 5: Docker login missing credentials
      - name: Login to DockerHub
        run: docker login -u ${{ secrets.DOCKER_USER }}

      # ERROR 6: Wrong image name format
      - name: Build Docker Image
        run: docker build -t my-app .

      - name: Push Docker Image
        run: docker push my-app
